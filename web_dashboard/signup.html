<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Signup - Police Dashboard</title>
  <link rel="stylesheet" href="login-styles.css" />
  <script type="module" src="signup-script.js" defer></script>
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
  <div class="login-container">
    <div class="login-background"></div>
    <div class="background-overlay"></div>

    <div class="login-form-container">
      <form id="signupForm" class="login-form" novalidate>
        <div class="logo-section">
          <h1>Create your account</h1>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" name="email" placeholder="you@example.com" required />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" name="password" placeholder="Choose a strong password" required minlength="6" />
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required minlength="6" />
          </div>
        </div>

        <button type="submit" class="login-btn">Sign Up</button>

        <p style="margin-top: 15px;">
          Already have an account? <a href="login.html">Login here</a>
        </p>

        <div id="message" style="margin-top:10px;"></div>
      </form>
    </div>
  </div>
</body>
</html>
