<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speak 4 CV - AI-Powered Voice CV Builder</title>
    <meta name="description"
        content="Create your CV using voice with AI-powered technology. Simply speak and let AI build your professional resume.">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Landing Page -->
    <div class="page active">
        <div class="background-gradient"></div>
        <div class="content-container">
            <h1 class="main-title">Welcome to Speak 4 CV</h1>
            <p class="subtitle">Create your professional CV with the power of your voice</p>

            <!-- Language Selector -->
            <div class="language-selector-container">
                <label for="language-select" class="language-label">Select Your Language:</label>
                <select id="language-select" class="language-select">
                    <option value="auto" selected>🔍 Auto-Detect Language</option>
                    <option value="en">English</option>
                    <option value="hi">हिंदी (Hindi)</option>
                    <option value="bn">বাংলা (Bengali)</option>
                    <option value="ta">தமிழ் (Tamil)</option>
                    <option value="te">తెలుగు (Telugu)</option>
                    <option value="mr">मराठी (Marathi)</option>
                    <option value="gu">ગુજરાતી (Gujarati)</option>
                    <option value="kn">ಕನ್ನಡ (Kannada)</option>
                    <option value="ml">മലയാളം (Malayalam)</option>
                    <option value="pa">ਪੰਜਾਬੀ (Punjabi)</option>
                    <option value="or">ଓଡ଼ିଆ (Odia)</option>
                    <option value="as">অসমীয়া (Assamese)</option>
                    <option value="ur">اردو (Urdu)</option>
                    <option value="sa">संस्कृत (Sanskrit)</option>
                    <option value="ne">नेपाली (Nepali)</option>
                    <option value="sd">سنڌي (Sindhi)</option>
                    <option value="ks">कॉशुर (Kashmiri)</option>
                    <option value="mai">मैथिली (Maithili)</option>
                    <option value="doi">डोगरी (Dogri)</option>
                    <option value="sat">ᱥᱟᱱᱛᱟᱲᱤ (Santali)</option>
                    <option value="mni">মৈতৈলোন্ (Manipuri)</option>
                    <option value="kok">कोंकणी (Konkani)</option>
                </select>
            </div>

            <div class="microphone-container">
                <div class="pulse-ring"></div>
                <div class="pulse-ring pulse-ring-delay"></div>
                <button id="mic-button" class="mic-button" aria-label="Start voice recording">
                    <svg class="mic-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 15C13.66 15 15 13.66 15 12V6C15 4.34 13.66 3 12 3C10.34 3 9 4.34 9 6V12C9 13.66 10.34 15 12 15Z"
                            fill="currentColor" />
                        <path
                            d="M17 12C17 14.76 14.76 17 12 17C9.24 17 7 14.76 7 12H5C5 15.53 7.61 18.43 11 18.92V21H13V18.92C16.39 18.43 19 15.53 19 12H17Z"
                            fill="currentColor" />
                    </svg>
                </button>
            </div>

            <div class="status-container">
                <p id="status-text" class="status-text">Click the microphone to start recording</p>
                <div id="recording-indicator" class="recording-indicator hidden">
                    <span class="recording-dot"></span>
                    <span>Recording...</span>
                </div>
            </div>

            <!-- Transcription Preview -->
            <div id="transcription-preview" class="transcription-preview hidden">
                <h3 class="preview-title">Transcription Preview</h3>
                <div class="preview-content">
                    <p id="preview-text" class="preview-text"></p>
                </div>
                <div class="preview-actions">
                    <button id="retry-btn" class="retry-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M4 4v6h6M20 20v-6h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L4 10m16 4l-1.64 4.36A9 9 0 0 1 3.51 15"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        Retry
                    </button>
                    <button id="continue-btn" class="continue-btn">
                        Continue →
                    </button>
                </div>
            </div>
        </div>

        <!-- Admin Override Button -->
        <button id="admin-override" class="admin-override">Admin Override →</button>
    </div>

    <script src="bhashini-config.js"></script>
    <script src="bhashini-asr.js"></script>
    <script src="landing.js"></script>
</body>

</html>
